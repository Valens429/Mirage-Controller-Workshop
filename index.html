<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Workshop Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0b0b0e; --card: #16161e; --accent: #9146ff; --text: #ffffff; --border: #2f2f3d; --success: #00f593; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        input, textarea { background: #1f1f29; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .mod-item { background: #1a1a24; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:var(--accent)">🛠️ Mirage Workshop</h1>
    
    <div class="card">
        <h2>Subir Nuevo Mod</h2>
        <input type="text" id="nombre" placeholder="Nombre del Mod">
        <input type="text" id="autor" placeholder="Tu Nick">
        <textarea id="descripcion" placeholder="Descripción breve..."></textarea>
        
        <input type="file" id="file-input" accept=".json" onchange="leerArchivo(this)" style="margin-bottom:10px;">
        <input type="hidden" id="json_data">
        
        <button class="btn" id="btn-submit" onclick="publicarMod()">Publicar Mod</button>
    </div>

    <div id="mod-list">
        <h3>Mods de la comunidad</h3>
        </div>
</div>

<script>
    // 1. INICIALIZACIÓN (Primero definimos las constantes)
    const URL_SB = 'https://wztjpzdcuokptmhemzsq.supabase.co';
    const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6dGpwemRjdW9rcHRtaGVtenNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTU4MjMsImV4cCI6MjA5MDkzMTgyM30.cYKZCvV4KfvrNd-RZZLNMTnRPWMreQgr9ClCP3wehR0';
    
    // 2. CREAR EL CLIENTE (Ahora sí existe 'sb')
    const sb = supabase.createClient(URL_SB, KEY_SB);

    // 3. FUNCIONES
    function leerArchivo(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('json_data').value = e.target.result;
            document.getElementById('nombre').value = file.name.replace('.json', '');
        };
        reader.readAsText(file);
    }

    async function publicarMod() {
        const btn = document.getElementById('btn-submit');
        const nombre = document.getElementById('nombre').value;
        const autor = document.getElementById('autor').value || 'Anónimo';
        const desc = document.getElementById('descripcion').value;
        const json = document.getElementById('json_data').value;

        if (!nombre || !json) return alert("Falta el archivo o el nombre.");

        try {
            btn.innerText = "Subiendo...";
            btn.disabled = true;

            const { error } = await sb.from('mods').insert([
                { nombre: nombre, autor: autor, descripcion: desc, comando_json: JSON.parse(json) }
            ]);

            if (error) throw error;
            location.reload();
        } catch (err) {
            alert("Error: " + err.message);
            btn.innerText = "Publicar Mod";
            btn.disabled = false;
        }
    }

    async function cargarMods() {
        const { data, error } = await sb.from('mods').select('*').order('fecha_subida', { ascending: false });
        if (error) return;

        const lista = document.getElementById('mod-list');
        data.forEach(mod => {
            const div = document.createElement('div');
            div.className = 'mod-item';
            div.innerHTML = `
                <strong>${mod.nombre}</strong> (por ${mod.autor})<br>
                <small>${mod.descripcion}</small><br>
                <button onclick="descargar('${mod.id}', '${mod.nombre}')" style="margin-top:5px; cursor:pointer;">📥 Descargar .json</button>
                <textarea id="raw-${mod.id}" class="hidden">${JSON.stringify(mod.comando_json)}</textarea>
            `;
            lista.appendChild(div);
        });
    }

    function descargar(id, nombre) {
        const txt = document.getElementById('raw-' + id).value;
        const blob = new Blob([txt], { type: 'application/json' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = nombre + ".json";
        document.body.appendChild(a); a.click();
        window.URL.revokeObjectURL(url);
    }

    cargarMods();
</script>

</body>
</html>
