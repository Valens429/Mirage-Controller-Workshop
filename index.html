<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Workshop | Search Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p: #9146ff; --s: #00f593; --bb: #050508; --bc: rgba(22, 22, 30, 0.7);
            --bi: #0a0a0f; --tm: #ffffff; --td: #9494b8; --br: rgba(255, 255, 255, 0.08);
            --tr: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif; background-color: var(--bb); color: var(--tm);
            background-image: radial-gradient(circle at 10% 10%, rgba(145, 70, 255, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }
        nav {
            position: sticky; top: 0; z-index: 999; display: flex; justify-content: space-between;
            align-items: center; padding: 1rem 8%; background: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--br);
        }
        .brand { font-size: 1.5rem; font-weight: 900; color: var(--p); }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        /* BUSCADOR */
        .search-container { margin: 40px 0; position: relative; }
        #search-input {
            width: 100%; background: var(--bi); border: 2px solid var(--br); color: #fff;
            padding: 20px 25px 20px 60px; border-radius: 50px; font-size: 1.1rem; transition: var(--tr);
        }
        #search-input:focus { border-color: var(--p); box-shadow: 0 0 20px rgba(145, 70, 255, 0.2); }
        .search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--p); font-size: 1.2rem; }

        /* FORMULARIO */
        .upload-card {
            background: var(--bc); border: 1px solid var(--br); border-radius: 25px;
            padding: 30px; margin-bottom: 60px; backdrop-filter: blur(20px);
        }
        .f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        input, textarea {
            background: #000; border: 1px solid var(--br); color: #fff;
            padding: 15px; border-radius: 12px; font-family: inherit; width: 100%;
        }
        .dz {
            border: 2px dashed var(--br); border-radius: 15px; padding: 30px;
            text-align: center; cursor: pointer; margin-bottom: 20px; transition: var(--tr);
        }
        .dz:hover { border-color: var(--p); background: rgba(145, 70, 255, 0.05); }
        .btn-up {
            background: var(--p); color: #fff; padding: 18px; border-radius: 15px;
            font-weight: 900; width: 100%; cursor: pointer; transition: var(--tr);
        }
        .btn-up:hover { filter: brightness(1.2); transform: translateY(-3px); }

        /* CARDS */
        .m-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .m-card {
            background: var(--bc); border: 1px solid var(--br); border-radius: 20px;
            padding: 25px; transition: var(--tr); display: flex; flex-direction: column;
        }
        .m-card:hover { border-color: var(--p); transform: translateY(-5px); }
        .m-card h3 { color: var(--s); margin-bottom: 5px; font-size: 1.4rem; }
        .m-meta { font-size: 0.8rem; color: var(--td); margin-bottom: 15px; }
        .m-body { flex-grow: 1; font-size: 0.9rem; color: #ccc; margin-bottom: 20px; }
        .dl-info { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--p); font-weight: 800; margin-bottom: 15px; }
        .btn-dl {
            background: #111; color: #fff; padding: 12px; border-radius: 10px;
            text-align: center; font-weight: 700; border: 1px solid var(--br); cursor: pointer;
        }
        .btn-dl:hover { background: var(--p); }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="brand">MIRAGE WORKSHOP</div>
    <div id="stats-day" style="font-size: 0.7rem; font-weight: 800;"></div>
</nav>

<div class="container">
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="Buscar por nombre o autor..." onkeyup="filtrarMods()">
    </div>

    <section class="upload-card">
        <div class="f-grid">
            <input type="text" id="n_m" placeholder="Nombre del Mod">
            <input type="text" id="a_m" placeholder="Tu Nick">
        </div>
        <textarea id="d_m" rows="2" placeholder="Descripción breve..." style="margin-bottom: 20px;"></textarea>
        <label for="f_u" class="dz" id="dz-label">
            <i class="fa-solid fa-file-code" style="font-size: 1.5rem; color: var(--p);"></i>
            <p id="f_s">Soltá tu .json acá</p>
            <input type="file" id="f_u" accept=".json" class="hidden" onchange="handleFile(this)">
        </label>
        <input type="hidden" id="j_r">
        <button class="btn-up" id="btn-submit" onclick="subir()">PUBLICAR EN WORKSHOP</button>
    </section>

    <div id="main-grid" class="m-grid"></div>
</div>

<script>
    const URL_S = 'https://wztjpzdcuokptmhemzsq.supabase.co';
    const KEY_S = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6dGpwemRjdW9rcHRtaGVtenNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTU4MjMsImV4cCI6MjA5MDkzMTgyM30.cYKZCvV4KfvrNd-RZZLNMTnRPWMreQgr9ClCP3wehR0';
    const sb = window.supabase.createClient(URL_S, KEY_S);
    let allMods = [];

    async function cargar() {
        const { data, error } = await sb.from('mods').select('*').order('fecha_subida', { ascending: false });
        if (error) return console.log(error);
        allMods = data;
        render(allMods);
    }

    function render(lista) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        lista.forEach(m => {
            const card = document.createElement('div');
            card.className = 'm-card';
            card.innerHTML = `
                <div class="dl-info"><i class="fa-solid fa-download"></i> <span id="count-${m.id}">${m.descargas || 0}</span> DESCARGAS</div>
                <h3>${m.nombre}</h3>
                <p class="m-meta">Subido por <b>${m.autor}</b></p>
                <div class="m-body">${m.descripcion || 'Sin descripción.'}</div>
                <button class="btn-dl" onclick="descargar('${m.id}', '${m.nombre}')">OBTENER JSON</button>
                <textarea id="raw-${m.id}" class="hidden">${JSON.stringify(m.comando_json)}</textarea>
            `;
            grid.appendChild(card);
        });
    }

    function filtrarMods() {
        const busqueda = document.getElementById('search-input').value.toLowerCase();
        const filtrados = allMods.filter(m => 
            m.nombre.toLowerCase().includes(busqueda) || 
            m.autor.toLowerCase().includes(busqueda)
        );
        render(filtrados);
    }

    async function descargar(id, nombre) {
        await sb.rpc('sumar_descarga', { mod_id: id });
        const json = document.getElementById('raw-' + id).value;
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = nombre + ".json"; a.click();
        
        const txt = document.getElementById('count-' + id);
        if(txt) txt.innerText = parseInt(txt.innerText) + 1;
    }

    function handleFile(el) {
        const f = el.files[0];
        if(!f) return;
        const r = new FileReader();
        r.onload = (e) => {
            try {
                JSON.parse(e.target.result);
                document.getElementById('j_r').value = e.target.result;
                document.getElementById('f_s').innerText = "ARCHIVO LISTO: " + f.name;
                if(!document.getElementById('n_m').value) document.getElementById('n_m').value = f.name.replace('.json','');
            } catch { alert("JSON inválido."); el.value = ""; }
        };
        r.readAsText(f);
    }

    async function subir() {
        const n = document.getElementById('n_m').value, a = document.getElementById('a_m').value || 'Anónimo', d = document.getElementById('d_m').value, j = document.getElementById('j_r').value;
        if(!n || !j) return alert("Faltan datos.");
        const btn = document.getElementById('btn-submit'); btn.disabled = true;
        const { error } = await sb.from('mods').insert([{ nombre: n, autor: a, descripcion: d, comando_json: JSON.parse(j) }]);
        if(error) { alert(error.message); btn.disabled = false; } else { location.reload(); }
    }

    window.onload = cargar;
</script>

</body>
</html>
