<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mirage Controller - Workshop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; }
        input, textarea, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: none; }
        button { background: #6441a5; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #7d5bbe; }
        .mod-list { margin-top: 30px; }
        pre { background: #000; padding: 10px; font-size: 12px; overflow-x: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ Mirage Workshop (Alpha)</h1>
    
    <div class="card">
        <h3>Subir nuevo comando</h3>
        <input type="text" id="nombre" placeholder="Nombre del comando">
        <input type="text" id="autor" placeholder="Tu nombre/nick (opcional)">
        <textarea id="descripcion" placeholder="¿Qué hace este comando?"></textarea>
        <p>Pegá el JSON del comando acá abajo:</p>
        <textarea id="json_content" rows="5" placeholder='{"command": "!hola", "action": "beep"}'></textarea>
        <button onclick="subirMod()">Publicar en la Workshop</button>
    </div>

    <div class="mod-list" id="lista-mods">
        <h2>Comandos de la comunidad</h2>
        <p>Cargando mods...</p>
    </div>
</div>

<script>
    // CONFIGURACIÓN: Reemplazá con tus keys de Supabase
    const SUPABASE_URL = 'https://jcwvyewdpflswwynbwlu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impjd3Z5ZXdkcGZsc3d3eW5id2x1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTQ2MzYsImV4cCI6MjA5MDkzMDYzNn0.3jn1iOaXIojMRR6z0HC0pfaoUEPT0IczWZmDux2tg8k';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Función para subir el mod
    async function subirMod() {
        const nombre = document.getElementById('nombre').value;
        const autor = document.getElementById('autor').value || 'Anónimo';
        const descripcion = document.getElementById('descripcion').value;
        const jsonText = document.getElementById('json_content').value;

        if(!nombre || !jsonText) return alert("Che, completá el nombre y el JSON mínimo.");

        try {
            const comandoJson = JSON.parse(jsonText);
            const { error } = await supabase.from('mods').insert([
                { nombre, autor, descripcion, comando_json: comandoJson }
            ]);

            if (error) throw error;
            alert("¡Mod subido con éxito, fiera!");
            location.reload();
        } catch (e) {
            alert("Error: El JSON no es válido o falló la conexión.");
        }
    }

    // Función para cargar los mods
    async function cargarMods() {
        const { data, error } = await supabase
            .from('mods')
            .select('*')
            .order('fecha_subida', { ascending: false });

        if (error) return console.error(error);

        const contenedor = document.getElementById('lista-mods');
        contenedor.innerHTML = '<h2>Comandos de la comunidad</h2>';

        data.forEach(mod => {
            const fecha = new Date(mod.fecha_subida).toLocaleDateString();
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>${mod.nombre}</strong>
                    <small>${fecha}</small>
                </div>
                <p style="color:#bbb">${mod.descripcion}</p>
                <small>Autor: ${mod.autor}</small>
                <button onclick="descargarJSON('${mod.id}')" style="margin-top:10px; background:#444;">Copiar JSON</button>
                <pre id="raw-${mod.id}" style="display:none;">${JSON.stringify(mod.comando_json, null, 2)}</pre>
            `;
            contenedor.appendChild(div);
        });
    }

    function descargarJSON(id) {
        const code = document.getElementById('raw-' + id).innerText;
        navigator.clipboard.writeText(code);
        alert("¡JSON copiado al portapapeles! Pegalo en el Mirage Controller.");
    }

    cargarMods();
</script>

</body>
</html>
