<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Controller | Workshop Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0b0e;
            --card: #16161e;
            --accent: #9146ff;
            --accent-hover: #a970ff;
            --text: #ffffff;
            --text-dim: #9494b8;
            --border: #2f2f3d;
            --success: #00f593;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Fachera */
        nav {
            padding: 1.5rem 2rem;
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .container { max-width: 1100px; margin: 3rem auto; padding: 0 1.5rem; width: 100%; box-sizing: border-box; }

        /* Sección de Subida */
        .upload-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 4rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .upload-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent);
        }

        h2 { margin-top: 0; font-weight: 800; font-size: 1.8rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        input, textarea {
            background: #1f1f29;
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: #252531; }

        /* Dropzone de Archivos */
        .file-zone {
            border: 2px dashed var(--border);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .file-zone:hover { border-color: var(--accent); background: rgba(145, 70, 255, 0.05); }
        .file-zone i { font-size: 2rem; display: block; margin-bottom: 10px; }

        .btn-post {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-post:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(145, 70, 255, 0.4); }

        /* Feed del Foro */
        .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .mod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .mod-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.8rem;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .mod-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .mod-name { font-weight: 800; font-size: 1.3rem; margin-bottom: 5px; color: var(--success); }
        .mod-meta { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px; }
        .mod-desc { font-size: 0.95rem; color: #ced4da; margin-bottom: 20px; flex-grow: 1; }

        .btn-download {
            background: #252531;
            color: var(--text);
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-download:hover { background: var(--border); border-color: var(--text-dim); }

        /* Utilería */
        .hidden { display: none; }
        .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; background: rgba(0, 245, 147, 0.1); color: var(--success); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MIRAGE <span>CONTROLLER</span></div>
        <div class="status-badge">● Foro Live</div>
    </nav>

    <div class="container">
        <div class="upload-card">
            <h2>📤 Compartir Mod</h2>
            <div class="form-grid">
                <input type="text" id="nombre" placeholder="Nombre del Mod (se autocompleta)">
                <input type="text" id="autor" placeholder="Tu Nick de Twitch">
            </div>
            <textarea id="descripcion" rows="2" placeholder="Describí brevemente qué hace este mod..."></textarea>
            
            <div style="margin-top: 20px;">
                <label for="file-input" class="file-zone" id="dropzone">
                    <span id="file-label">📁 Soltá tu archivo .json acá o hacé clic</span>
                    <input type="file" id="file-input" accept=".json" class="hidden" onchange="procesarArchivo(this)">
                </label>
            </div>

            <input type="hidden" id="json_data">
            <button class="btn-post" onclick="publicarMod()" id="btn-submit">Publicar en el Foro</button>
        </div>

        <div class="feed-header">
            <h2 style="margin:0">Descubrir Mods</h2>
            <div style="font-size: 0.9rem; color: var(--text-dim);">Últimas subidas</div>
        </div>

        <div id="mod-list" class="mod-grid">
            </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE (Tus credenciales reales)
        const URL = 'https://wztjpzdcuokptmhemzsq.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiisInd6dGpwemRjdW9rcHRtaGVtenNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTU4MjMsImV4cCI6MjA5MDkzMTgyM30.cYKZCvV4KfvrNd-RZZLNMTnRPWMreQgr9ClCP3wehR0';
        
        const sb = supabase.createClient(URL, KEY);

        // LEER EL ARCHIVO .JSON
        function procesarArchivo(input) {
            const file = input.files[0];
            if (!file) return;

            // Filtro de Seguridad
            if (!file.name.endsWith('.json')) {
                alert("Che, solo archivos .json!");
                input.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const content = e.target.result;
                    JSON.parse(content); // Validamos que sea JSON real
                    document.getElementById('json_data').value = content;
                    document.getElementById('nombre').value = file.name.replace('.json', '');
                    document.getElementById('file-label').innerText = "✅ Archivo listo: " + file.name;
                    document.getElementById('file-label').style.color = "var(--success)";
                } catch (err) {
                    alert("Error: El archivo JSON está corrupto.");
                }
            };
            reader.readAsText(file);
        }

        // SUBIR A SUPABASE
        async function publicarMod() {
            const btn = document.getElementById('btn-submit');
            const nombre = document.getElementById('nombre').value;
            const autor = document.getElementById('autor').value || 'Anónimo';
            const desc = document.getElementById('descripcion').value;
            const json = document.getElementById('json_data').value;

            if (!nombre || !json) return alert("Falta el archivo o el nombre.");

            btn.innerText = "Subiendo...";
            btn.disabled = true;

            const { error } = await sb.from('mods').insert([
                { nombre, autor, descripcion: desc, comando_json: JSON.parse(json) }
            ]);

            if (error) {
                alert("Error al subir: " + error.message);
                btn.innerText = "Publicar en el Foro";
                btn.disabled = false;
            } else {
                location.reload();
            }
        }

        // CARGAR EL FEED
        async function cargarForo() {
            const { data, error } = await sb.from('mods').select('*').order('fecha_subida', { ascending: false });
            
            if (error) return console.error(error);

            const container = document.getElementById('mod-list');
            container.innerHTML = '';

            data.forEach(mod => {
                const card = document.createElement('div');
                card.className = 'mod-card';
                card.innerHTML = `
                    <div class="mod-name">${mod.nombre}</div>
                    <div class="mod-meta">Subido por <b>${mod.autor}</b> • ${new Date(mod.fecha_subida).toLocaleDateString()}</div>
                    <div class="mod-desc">${mod.descripcion || 'Sin descripción disponible.'}</div>
                    <div class="btn-download" onclick="descargarJSON('${mod.id}', '${mod.nombre}')">
                        📥 Descargar .json
                    </div>
                    <textarea id="raw-${mod.id}" class="hidden">${JSON.stringify(mod.comando_json)}</textarea>
                `;
                container.appendChild(card);
            });
        }

        // DESCARGAR EL ARCHIVO REAL
        function descargarJSON(id, nombre) {
            const contenido = document.getElementById('raw-' + id).value;
            const blob = new Blob([contenido], { type: 'application/json' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nombre + ".json";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        cargarForo();
    </script>
</body>
</html>
