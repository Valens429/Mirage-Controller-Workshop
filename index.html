<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage Workshop</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial;
    background: #0a0a0f;
    color: white;
    padding: 20px;
}
input, textarea, button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
}
.card {
    border: 1px solid #333;
    padding: 15px;
    margin: 10px 0;
}
</style>
</head>

<body>

<h1>Mirage Workshop</h1>

<h2>Subir JSON</h2>

<input id="m-n" placeholder="Nombre">
<input id="m-a" placeholder="Autor">
<textarea id="m-d" placeholder="Descripción"></textarea>
<input type="file" id="m-f" accept=".json">
<button onclick="s_u()">Subir</button>

<h2>Mods</h2>
<div id="mods"></div>

<script>
const U_R = 'https://wztjpzdcuokptmhemzsq.supabase.co';
const K_Y = 'TU_ANON_KEY';
const s_b = supabase.createClient(U_R, K_Y);

async function s_u() {
    const nombre = document.getElementById('m-n').value.trim();
    const autor = document.getElementById('m-a').value.trim() || "Anon";
    const desc = document.getElementById('m-d').value.trim();
    const file = document.getElementById('m-f').files[0];

    if (!nombre || !file) {
        alert("Faltan cosas capo");
        return;
    }

    const text = await file.text();

    let json;
    try {
        json = JSON.parse(text);
    } catch {
        alert("JSON inválido");
        return;
    }

    const { error } = await s_b.from('mods').insert([{
        nombre: nombre,
        autor: autor,
        descripcion: desc,
        comando_json: json
    }]);

    if (error) {
        alert(error.message);
        return;
    }

    alert("Subido piola 😎");
    loadMods();
}

async function loadMods() {
    const { data } = await s_b.from('mods')
        .select('*')
        .order('id', { ascending: false });

    const container = document.getElementById('mods');
    container.innerHTML = '';

    data.forEach(m => {
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <h3>${m.nombre}</h3>
            <p>${m.descripcion || ''}</p>
            <button onclick="download('${m.id}', '${m.nombre}')">Descargar</button>
            <textarea id="j-${m.id}" style="display:none">${JSON.stringify(m.comando_json)}</textarea>
        `;

        container.appendChild(div);
    });
}

function download(id, name) {
    const text = document.getElementById('j-' + id).value;
    const blob = new Blob([text], { type: 'application/json' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = name + ".json";
    a.click();
}

loadMods();
</script>

</body>
</html>
