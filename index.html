<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Workshop | Simple & Fast</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --p: #9146ff; --bg: #0f0f15; --card: #1a1a24; --txt: #ffffff; --dim: #9494b8; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        .wrapper { max-width: 800px; margin: auto; }
        
        /* Formulario */
        .box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #2f2f3d; margin-bottom: 30px; }
        input, textarea { width: 100%; background: #0b0b0e; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn:disabled { background: #444; cursor: not-allowed; }

        /* Lista de Mods */
        .mod-card { background: var(--card); border-left: 5px solid var(--p); padding: 20px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .mod-card.vip { border-left-color: #ffb400; }
        .mod-card h3 { margin: 0 0 5px 0; color: #00f593; }
        .mod-card.vip h3 { color: #ffb400; }
        .mod-card p { margin: 5px 0; font-size: 0.9rem; color: var(--dim); }
        .dl-btn { background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: 700; }
        .dl-btn:hover { background: var(--p); }

        .tag { font-size: 0.7rem; background: #333; padding: 3px 8px; border-radius: 4px; color: #fff; text-transform: uppercase; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1 style="color:var(--p)">🛠️ Mirage Workshop</h1>
    <p style="color:var(--dim)">Subí y descargá comandos para tu controller.</p>

    <div class="box">
        <h2 style="margin-top:0">Publicar Mod</h2>
        <input type="text" id="nombre" placeholder="Nombre del Mod (ej: !hola)">
        <input type="text" id="autor" placeholder="Tu nombre / Nick">
        <textarea id="desc" placeholder="¿Qué hace este comando?"></textarea>
        
        <p style="font-size:0.8rem; margin-bottom:5px;">Seleccioná tu archivo .json:</p>
        <input type="file" id="file" accept=".json" onchange="procesarArchivo(this)">
        
        <input type="hidden" id="json_data">
        <button class="btn" id="btn-pub" onclick="subirMod()">PUBLICAR AHORA</button>
        <p id="limit-msg" style="font-size:0.7rem; text-align:center; color:var(--dim); margin-top:10px;"></p>
    </div>

    <h2>⭐ Destacados</h2>
    <div id="lista-vip"></div>

    <h2 style="margin-top:40px">🌐 Comunidad</h2>
    <div id="lista-comu"></div>
</div>

<script>
    // 1. CONFIGURACIÓN (Sin choque de nombres)
    const URL_SB = 'https://wztjpzdcuokptmhemzsq.supabase.co';
    const KEY_SB = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6dGpwemRjdW9rcHRtaGVtenNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTU4MjMsImV4cCI6MjA5MDkzMTgyM30.cYKZCvV4KfvrNd-RZZLNMTnRPWMreQgr9ClCP3wehR0';
    
    // El cliente se llama sbClient para evitar líos
    const sbClient = supabase.createClient(URL_SB, KEY_SB);
    const LIMIT = 5;

    // 2. LÍMITE DIARIO
    function getStats() {
        const hoy = new Date().toDateString();
        let stats = JSON.parse(localStorage.getItem('mirage_stats')) || { dia: hoy, cant: 0 };
        if (stats.dia !== hoy) stats = { dia: hoy, cant: 0 };
        document.getElementById('limit-msg').innerText = `Subidas hoy: ${stats.cant} / ${LIMIT}`;
        return stats;
    }

    // 3. LEER JSON
    function procesarArchivo(el) {
        const archivo = el.files[0];
        if (!archivo) return;
        const lector = new FileReader();
        lector.onload = (e) => {
            try {
                JSON.parse(e.target.result); // Validar
                document.getElementById('json_data').value = e.target.result;
                if(!document.getElementById('nombre').value) {
                    document.getElementById('nombre').value = archivo.name.replace('.json', '');
                }
            } catch(err) { alert("Archivo JSON inválido fiera."); el.value = ""; }
        };
        lector.readAsText(archivo);
    }

    // 4. SUBIR A SUPABASE
    async function subirMod() {
        const stats = getStats();
        if (stats.cant >= LIMIT) return alert("Ya subiste mucho por hoy, descansá un poco.");

        const btn = document.getElementById('btn-pub');
        const n = document.getElementById('nombre').value;
        const a = document.getElementById('autor').value || 'Anónimo';
        const d = document.getElementById('desc').value;
        const j = document.getElementById('json_data').value;

        if (!n || !j) return alert("Falta el nombre o el archivo.");

        try {
            btn.disabled = true; btn.innerText = "SUBIENDO...";
            
            const { error } = await sbClient.from('mods').insert([
                { nombre: n, autor: a, descripcion: d, comando_json: JSON.parse(j) }
            ]);

            if (error) throw error;

            stats.cant += 1;
            localStorage.setItem('mirage_stats', JSON.stringify(stats));
            alert("¡Mod publicado joyita!");
            location.reload();
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false; btn.innerText = "PUBLICAR AHORA";
        }
    }

    // 5. CARGAR LISTA
    async function cargarTodo() {
        const { data, error } = await sbClient.from('mods').select('*').order('fecha_subida', { ascending: false });
        if (error) return console.log(error);

        const vipBox = document.getElementById('lista-vip');
        const comuBox = document.getElementById('lista-comu');

        data.forEach(m => {
            const card = document.createElement('div');
            card.className = `mod-card ${m.verificado ? 'vip' : ''}`;
            card.innerHTML = `
                <h3>${m.verificado ? '⭐ ' : ''}${m.nombre}</h3>
                <p><span class="tag">Autor: ${m.autor}</span></p>
                <p style="color:#eee">${m.descripcion || 'Sin descripción.'}</p>
                <button class="dl-btn" onclick="bajar('${m.id}', '${m.nombre}')">📥 Descargar JSON</button>
                <textarea id="raw-${m.id}" class="hidden">${JSON.stringify(m.comando_json)}</textarea>
            `;
            if (m.verificado) vipBox.appendChild(card);
            else comuBox.appendChild(card);
        });
    }

    // 6. DESCARGAR
    function bajar(id, nom) {
        const txt = document.getElementById('raw-' + id).value;
        const blob = new Blob([txt], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.download = nom + ".json";
        link.click();
    }

    // INICIO
    getStats();
    cargarTodo();
</script>

</body>
</html>
